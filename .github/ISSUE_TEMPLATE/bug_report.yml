name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Install elite-reasoning-mcp
        2. Call tool X with arguments Y
        3. See error Z
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of elite-reasoning-mcp are you using?
      placeholder: "1.1.2"
    validations:
      required: true
  - type: dropdown
    id: ide
    attributes:
      label: IDE
      options:
        - Cursor
        - Antigravity
        - VS Code + Continue
        - Windsurf
        - Claude Desktop
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.11"
