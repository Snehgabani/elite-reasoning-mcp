name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Import check
        run: uv run python -c "from core.integration.mcp_server import create_mcp_server; print('Import OK')"

      - name: Server creation test
        shell: bash
        run: |
          uv run python -c "
          from core.integration.mcp_server import create_mcp_server
          import tempfile, shutil
          brain = tempfile.mkdtemp()
          server = create_mcp_server(brain)
          tools = server._tool_manager._tools
          count = len(tools)
          print(f'Server created with {count} tools')
          assert count >= 50, f'Expected 50+ tools, got {count}'
          shutil.rmtree(brain)
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install with dev deps
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check . --select E,F,W --ignore E501
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t elite-reasoning-mcp .

      - name: Verify server starts in Docker
        run: |
          docker run --rm elite-reasoning-mcp python -c "
          from core.integration.mcp_server import create_mcp_server
          server = create_mcp_server('/data/brain')
          print(f'Docker OK: {len(server._tool_manager._tools)} tools')
          "
